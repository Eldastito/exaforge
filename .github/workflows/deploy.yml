name: CI/CD Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/node-center@v3
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Trigger Server Deploy Webhook
        if: success()
        run: |
          # Substitua pela URL do seu Webhook do Easypanel ou Servidor
          curl -X POST ${{ secrets.DEPLOY_WEBHOOK_URL }}
